spring:
  application:
    name: ai-chat-api
  datasource:
    url: jdbc:h2:mem:aichat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    # 데모용 기본 시크릿. 운영에서는 환경변수 APP_JWT_SECRET 로 주입.
    secret: ${APP_JWT_SECRET:demo-secret-key-change-me-in-production-please-32bytes-min}
    expiration-millis: 86400000 # 24h
  seed:
    # 데모 계정 자동 생성 토글 (admin@demo.com / member@demo.com)
    enabled: true
  llm:
    # OPENAI_API_KEY 환경변수가 있으면 OpenAI 실호출, 없으면 자동으로 Mock provider 사용.
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
      default-model: gpt-4o-mini

logging:
  level:
    org.hibernate.SQL: debug
